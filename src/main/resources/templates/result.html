<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Svar från API</title>
    <style>
        .success-box {
            background-color: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #c3e6cb;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Status för anropet</h1>

    <div class="success-box">
        <h2 th:text="${message}">Standardmeddelande</h2>

        <p>Ditt inlägg har nu processats av det externa API:et.</p>
    </div>

    <a href="/create-post" class="btn">Skapa ett till inlägg</a>

</body>
</html>
